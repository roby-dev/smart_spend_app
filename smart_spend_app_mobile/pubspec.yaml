name: smart_spend_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3
  flutter_riverpod: 3.1.0
  uuid: ^4.5.0
  flutter_svg: ^2.2.4
  go_router: ^17.1.0
  google_sign_in: ^7.2.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  intl: ^0.20.1
  json_annotation: ^4.11.0
  path: ^1.9.0
  path_provider: ^2.1.5
  riverpod_annotation: 4.0.0
  share_plus: ^12.0.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  drift_dev: ^2.31.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: 4.0.0+1
  build_runner: ^2.13.1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_smart_icon_morado.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_blanco.png
  android_12:
    image: assets/images/splash_blanco.png
    color: "#FFFFFF"